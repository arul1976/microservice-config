server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3307/authdb
    username: root
    password: root

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1

jwt:
  secret-key: 1234567890123456789012345678901234567890123456789012345678901234
  expiration: 86400000

logging:
  level:
    org.springframework.security: DEBUG
